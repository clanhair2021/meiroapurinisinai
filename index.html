<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>美容室CLanからの挑戦状</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 1. メニュー画面（ステージ選択） -->
    <div id="menu-page" class="page active">
        <header class="menu-header">
            <h1>美容室CLanからの挑戦状</h1>
            
            <!-- 右上の隠し設定メニュー -->
            <div class="settings-menu">
                <button class="settings-trigger" onclick="toggleSettings()">設定</button>
                <div class="settings-content" id="settingsContent">
                    <div class="settings-item">
                        <label>方法A：画像2枚で登録</label>
                        <button class="settings-btn" onclick="openAdmin('imageMode')">開く</button>
                    </div>
                    <div class="settings-item" style="margin-top: 10px;">
                        <label>方法B：なぞり登録</label>
                        <button class="settings-btn" onclick="openAdmin('traceMode')">開く</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 下にひとつずつ置かれていくステージ一覧 -->
        <main class="stage-container">
            <div class="stage-card" onclick="startGame()">
                <div class="stage-image-box">
                    <div class="image-placeholder">STAGE 1</div>
                </div>
                <div class="stage-info">
                    <div class="stage-number">Stage 01</div>
                    <div class="stage-title">CLanからの最初の迷路</div>
                </div>
            </div>
        </main>
    </div>

    <!-- 2. ゲーム・登録共通画面（迷路最大化バージョン） -->
    <div id="game-page" class="page">
        
        <!-- 左上の目立たないメニュー開閉ボタン -->
        <button id="menu-toggle" onclick="toggleDrawer()">MENU</button>

        <!-- スライド式操作パネル（普段は隠れています） -->
        <div id="drawer-menu">
            <div class="drawer-header">
                <h3 id="page-title">迷路メニュー</h3>
                <button class="close-drawer" onclick="toggleDrawer()">×</button>
            </div>
            
            <div class="drawer-section">
                <button class="drawer-btn" onclick="goBackMenu(); toggleDrawer();">メニューに戻る</button>
                <button class="drawer-btn undo-btn" onclick="undoLastLine(); toggleDrawer();">1つ戻る</button>
                <button class="drawer-btn" onclick="resetCanvas(); toggleDrawer();">全部引き直す</button>
            </div>
            
            <div class="drawer-section">
                <p class="section-label">操作モード</p>
                <div class="mode-toggle-group">
                    <button id="btn-draw" class="mode-btn selected" onclick="setMode('draw'); toggleDrawer();">お絵描き</button>
                    <button id="btn-zoom" class="mode-btn" onclick="setMode('zoom'); toggleDrawer();">拡大移動</button>
                </div>
            </div>
        </div>

        <!-- 管理者用コントロールパネル（設定から開いたときだけ画面下部に控えめに表示） -->
        <div id="admin-controls" style="display: none;">
            <div id="ctrl-image-mode">
                <p>1. 問題画像：<input type="file" id="img-question" accept="image/*"></p>
                <p>2. 答え画像：<input type="file" id="img-answer" accept="image/*"></p>
                <div class="setup-zone">
                    <span id="setup-status">位置を指定してください</span><br>
                    <button class="admin-sub" onclick="setSetupStep('start')">スタート位置を指定</button>
                    <button class="admin-sub" onclick="setSetupStep('goal')">ゴール位置を指定</button>
                </div>
                <button class="admin-save" onclick="saveImageModeData()">設定をまとめて保存</button>
            </div>
            <div id="ctrl-trace-mode" style="display:none;">
                <p>1. 迷路画像を選択：<input type="file" id="img-single" accept="image/*"></p>
                <p>2. スタートからゴールまでお手本をなぞってください。</p>
                <button class="admin-save" onclick="saveTraceModeData()">なぞったルートを保存</button>
            </div>
        </div>

        <!-- 迷路表示エリア（スマートフォンの画面いっぱいに広がるよう調整） -->
        <div id="canvas-container">
            <div id="maze-wrapper">
                <img id="maze-bg" alt="迷路の背景">
                <canvas id="canvas" width="360" height="520"></canvas>
            </div>
        </div>
    </div>

    <canvas id="hidden-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
